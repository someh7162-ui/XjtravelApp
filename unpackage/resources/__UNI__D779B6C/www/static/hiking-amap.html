<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Hiking AMap</title>
  <style>
    html, body, #map {
      margin: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #18314c 0%, #0b1118 100%);
      overflow: hidden;
    }

    .amap-logo,
    .amap-copyright {
      opacity: 0.72 !important;
    }

  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (function () {
      var map = null
      var marker = null
      var polyline = null
      var pendingState = null
      var sdkReady = false
      var sdkVersion = '1.4.15'
      var amapKey = getQueryParam('key') || ''
      var initialMode = getQueryParam('mode') || 'satellite'
      var securityJsCode = getQueryParam('securityJsCode') || ''

      function getQueryParam(name) {
        var search = String(window.location.search || '').replace(/^\?/, '')
        if (!search) {
          return ''
        }

        var pairs = search.split('&')
        for (var index = 0; index < pairs.length; index += 1) {
          var parts = pairs[index].split('=')
          if (decodeURIComponent(parts[0] || '') === name) {
            return decodeURIComponent(parts[1] || '')
          }
        }

        return ''
      }

      function createPoint(longitude, latitude) {
        var lng = Number(longitude)
        var lat = Number(latitude)
        if (!Number.isFinite(lng) || !Number.isFinite(lat) || !window.AMap) {
          return null
        }
        return new AMap.LngLat(lng, lat)
      }

      function buildLayers(mode) {
        if (!window.AMap) {
          return []
        }

        if (mode === 'normal') {
          return [new AMap.TileLayer()]
        }

        return [
          new AMap.TileLayer.Satellite(),
          new AMap.TileLayer.RoadNet(),
        ]
      }

      function ensureMap(state) {
        if (map || !window.AMap) {
          return
        }

        try {
          map = new AMap.Map('map', {
            zoom: Number(state.zoom || 16),
            center: createPoint(state.longitude, state.latitude) || undefined,
            viewMode: '2D',
            mapStyle: 'amap://styles/normal',
            layers: buildLayers(state.mode || initialMode),
            resizeEnable: true,
            rotateEnable: false,
          })
        } catch (err) {}
      }

      function updateLayers(mode) {
        if (!map || !window.AMap) {
          return
        }

        try {
          if (typeof map.setLayers === 'function') {
            map.setLayers(buildLayers(mode || initialMode))
          }
        } catch (err) {}
      }

      function updateMarker(state) {
        var markers = Array.isArray(state.markers) ? state.markers : []
        var firstMarker = markers[0] || state
        var point = createPoint(firstMarker.longitude, firstMarker.latitude)
        if (!point || !window.AMap || !map) {
          return
        }

        if (!marker) {
          marker = new AMap.Marker({
            position: point,
            anchor: 'center',
            label: firstMarker.label
              ? {
                  content: firstMarker.label,
                  direction: 'top',
                }
              : undefined,
          })
          marker.setMap(map)
          return
        }

        marker.setPosition(point)
        if (typeof marker.setLabel === 'function') {
          marker.setLabel({
            content: firstMarker.label || '',
            direction: 'top',
          })
        }
      }

      function updateTrack(state) {
        var points = Array.isArray(state.track)
          ? state.track.map(function (item) {
              return createPoint(item.longitude, item.latitude)
            }).filter(Boolean)
          : []

        if (!points.length) {
          if (polyline) {
            polyline.setMap(null)
            polyline = null
          }
          return
        }

        if (!polyline) {
          polyline = new AMap.Polyline({
            path: points,
            strokeColor: '#ff7a00',
            strokeWeight: 5,
            outlineColor: '#c14f00',
            borderWeight: 1,
            lineJoin: 'round',
            lineCap: 'round',
          })
          polyline.setMap(map)
          return
        }

        polyline.setPath(points)
      }

      function applyState(state) {
        pendingState = state || pendingState || {}
        if (!sdkReady || !window.AMap) {
          return
        }

        ensureMap(pendingState)
        if (!map) {
          return
        }

        updateLayers(pendingState.mode || initialMode)

        var point = createPoint(pendingState.longitude, pendingState.latitude)
        if (point) {
          try {
            map.setZoomAndCenter(Number(pendingState.zoom || 16), point)
          } catch (err) {}
        }

        updateMarker(pendingState)
        updateTrack(pendingState)
      }

      function loadAmapSdk() {
        if (!amapKey) {
          return
        }

        if (securityJsCode) {
          window._AMapSecurityConfig = Object.assign({}, window._AMapSecurityConfig || {}, {
            securityJsCode: securityJsCode,
          })
        }

        var script = document.createElement('script')
        script.src = 'https://webapi.amap.com/maps?v=' + encodeURIComponent(sdkVersion) + '&key=' + encodeURIComponent(amapKey)
        script.async = true
        script.defer = true
        script.onload = function () {
          sdkReady = true
          applyState(pendingState || { zoom: 16, mode: initialMode })
        }
        script.onerror = function () {}
        document.head.appendChild(script)
      }

      window.updateMapState = function (state) {
        applyState(state || {})
      }

      loadAmapSdk()
    })()
  </script>
</body>
</html>
